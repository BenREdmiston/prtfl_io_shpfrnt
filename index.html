<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Digital Product | Portfolio Shop</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://fav.farm/🛍️">
</head>
<body>
    <nav>
        <div class="logo">DigitalStore</div>
        <div class="cart">🛒 (0)</div>
    </nav>

    <main class="hero">
        <div class="product-image">
            <div class="placeholder-img">Ebook Cover</div>
        </div>
        <div class="product-info">
            <h1>Mastering the Side Hustle</h1>
            <p class="price">$19.99</p>
            <p class="description">
                A comprehensive guide to building digital products while working a 9-5. 
                Learn the tools, the tech, and the strategy.
            </p>
            <a href="#" class="buy-button">Buy Now</a>
        </div>
    </main>

    <div id="cart-modal" class="modal">
    <div class="modal-content">
        <span class="close-cart">&times;</span>
        <h2>Your Shopping Cart</h2>
        <div id="cart-items">
            <div class="cart-item-row">
                <span>Mastering Side Hustles</span>
                <div class="quantity-controls">
                <button class="qty-btn" onclick="changeQty(-1)">-</button>
                <span id="qty-display">1</span>
                <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
            <span id="item-subtotal">$19.99</span>
        </div>
    </div>
        <hr>
        <div class="cart-total">
            <strong>Total: $<span id="total-price">0.00</span></strong>
        </div>
        <button id="checkout-btn" class="buy-button">Proceed to Checkout</button>
    </div>
</div>
    <footer>
        <p>&copy; 2026 Ben R Edmiston</p>
        <script src="script.js"></script>
    </footer>
</body>
</html>
